workflows:
  build:
    name: Build APK
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build
        script: |
          flutter create --org com.xray.vpn --project-name app .
          cd app
          flutter build apk --release
          cd ..
          cp app/build/app/outputs/flutter-apk/app-release.apk .
    artifacts:
      - "*.apk"
