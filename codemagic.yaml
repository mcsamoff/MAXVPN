workflows:
  build:
    name: Build APK
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create and build
        script: |
          flutter create --org com.xray.vpn --project-name xrayvpn .
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
