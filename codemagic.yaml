workflows:
  MAXVPN:
    name: Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build
        script: |
          flutter create --org com.vpn.app --project-name myapp .
          cd myapp
          flutter build apk --release
          cd ..
          cp myapp/build/app/outputs/flutter-apk/app-release.apk .
    artifacts:
      - "*.apk"
