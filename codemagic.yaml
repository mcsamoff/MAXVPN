workflows:
  xray-vpn-build:
    name: Xray VPN Builder
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create project
        script: |
          flutter create --org com.xray.vpn --project-name xrayvpn .
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
