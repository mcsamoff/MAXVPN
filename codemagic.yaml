workflows:
  xray-vpn-build:
    name: Xray VPN APK Builder
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        PACKAGE_NAME: "com.xrayvpn.client"
        APP_NAME: "Xray VPN"
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: 📱 Setup Flutter environment
        script: |
          echo "=== Flutter Environment Setup ==="
          echo "FLUTTER_ROOT: $FLUTTER_ROOT"
          
          # Добавляем пути в PATH
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          export PATH="$PATH":"$FLUTTER_ROOT/.pub-cache/bin"
          
          # Проверяем версии
          $FLUTTER_ROOT/bin/flutter doctor -v
          $FLUTTER_ROOT/bin/dart --version

      - name: 🧹 Clean and prepare
        script: |
          cd $CM_BUILD_DIR
          $FLUTTER_ROOT/bin/flutter clean
          rm -f pubspec.lock

      - name: 📦 Install dependencies
        script: |
          $FLUTTER_ROOT/bin/flutter pub get

      - name: 🔧 Build release APK
        script: |
          $FLUTTER_ROOT/bin/flutter build apk --release

      - name: 📁 Rename APK
        script: |
          APK_NAME="XrayVPN_$(date +%Y%m%d_%H%M%S).apk"
          mv build/app/outputs/flutter-apk/app-release.apk $APK_NAME
          echo "APK_NAME=$APK_NAME" >> $CM_ENV

    artifacts:
      - "*.apk"

    publishing:
      email:
        recipients:
          - your-email@example.com
