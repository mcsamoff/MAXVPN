workflows:
  xray-vpn-build:
    name: Xray VPN APK Builder
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: 📱 Setup Flutter
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter doctor

      - name: 📁 Create Flutter project
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          
          # Создаем проект если его нет
          if [ ! -f "pubspec.yaml" ]; then
            $FLUTTER_ROOT/bin/flutter create --org com.xrayvpn --project-name xray_vpn .
          fi
          
          # Создаем main.dart
          cat > lib/main.dart << 'DART_EOF'
      import 'package:flutter/material.dart';
      
      void main() => runApp(const MyApp());
      
      class MyApp extends StatelessWidget {
        const MyApp({super.key});
        
        @override
        Widget build(BuildContext context) {
          return MaterialApp(
            title: 'Xray VPN',
            theme: ThemeData.dark(),
            home: const HomePage(),
          );
        }
      }
      
      class HomePage extends StatelessWidget {
        const HomePage({super.key});
        
        @override
        Widget build(BuildContext context) {
          return Scaffold(
            appBar: AppBar(title: const Text('Xray VPN')),
            body: const Center(
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.vpn_key, size: 80),
                  SizedBox(height: 20),
                  Text('Xray VPN Client'),
                  SizedBox(height: 10),
                  Text('Ready to connect'),
                ],
              ),
            ),
          );
        }
      }
      DART_EOF
          
          echo "✅ main.dart created"

      - name: 📦 Install dependencies
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter pub get

      - name: 🛠 Build APK
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter build apk --release

    artifacts:
      - "build/app/outputs/flutter-apk/*.apk"
