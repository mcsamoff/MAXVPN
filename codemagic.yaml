workflows:
  xray-vpn-build:
    name: Xray VPN APK Builder
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache
        - android/.gradle

    scripts:
      - name: 📱 Setup Flutter
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter doctor

      - name: 📁 Create project if needed
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          
          if [ ! -f "pubspec.yaml" ]; then
            $FLUTTER_ROOT/bin/flutter create --org com.xrayvpn --project-name xray_vpn .
          fi
          
          if [ ! -f "lib/main.dart" ]; then
            mkdir -p lib
            cat > lib/main.dart << 'EOF'
import 'package:flutter/material.dart';

void main() => runApp(const MyApp());

class MyApp extends StatelessWidget {
  const MyApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'Xray VPN',
      theme: ThemeData.dark(),
      home: const HomePage(),
    );
  }
}

class HomePage extends StatelessWidget {
  const HomePage({super.key});

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(title: const Text('Xray VPN')),
      body: const Center(child: Text('VPN Client')),
    );
  }
}
EOF
          fi

      - name: 📦 Install dependencies
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter clean
          $FLUTTER_ROOT/bin/flutter pub get

      - name: 🛠 Build APK
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          
          echo "=== BUILDING RELEASE APK ==="
          $FLUTTER_ROOT/bin/flutter build apk --release
          
          echo "=== BUILD RESULT ==="
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ Success!"
            ls -la build/app/outputs/flutter-apk/
          else
            echo "❌ Build failed - checking for errors..."
            exit 1
          fi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
