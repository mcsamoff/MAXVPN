workflows:
  xray-vpn-build:
    name: Xray VPN APK Builder
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: 📱 Setup Flutter
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter doctor

      - name: 📁 Check/Create project
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          
          if [ ! -f "pubspec.yaml" ]; then
            echo "Creating new Flutter project..."
            $FLUTTER_ROOT/bin/flutter create --org com.xrayvpn --project-name xray_vpn .
          fi
          
          echo "Project files:"
          ls -la

      - name: 📦 Install dependencies
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          
          echo "Cleaning..."
          $FLUTTER_ROOT/bin/flutter clean
          rm -f pubspec.lock
          
          echo "Getting dependencies..."
          $FLUTTER_ROOT/bin/flutter pub get
          
          echo "Adding required packages..."
          $FLUTTER_ROOT/bin/flutter pub add flutter_vpn permission_handler provider

      - name: 🛠 Build APK
        script: |
          export PATH="$PATH":"$FLUTTER_ROOT/bin"
          $FLUTTER_ROOT/bin/flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
