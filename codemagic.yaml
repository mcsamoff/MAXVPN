workflows:
  MAXVPN:
    name: Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build
        script: |
          flutter create --org com.vpn.app --project-name myapp .
          flutter build apk --release
    artifacts:
      - "build/app/outputs/flutter-apk/*.apk"
