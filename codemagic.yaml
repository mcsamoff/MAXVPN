workflows:
  xray-vpn-build:
    name: Build APK
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create project
        script: |
          flutter create --org com.xray.vpn --project-name xrayvpn .
          
      - name: Create pubspec.yaml
        script: |
          cat > pubspec.yaml << EOF
      name: xrayvpn
      description: Xray VPN Client
      version: 1.0.0+1
      publish_to: none
      
      environment:
        sdk: '>=3.0.0 <4.0.0'
      
      dependencies:
        flutter:
          sdk: flutter
      
      dev_dependencies:
        flutter_test:
          sdk: flutter
      
      flutter:
        uses-material-design: true
      EOF
          
      - name: Create main.dart
        script: |
          mkdir -p lib
          cat > lib/main.dart << EOF
      import 'package:flutter/material.dart';
      
      void main() {
        runApp(const MyApp());
      }
      
      class MyApp extends StatelessWidget {
        const MyApp({super.key});
      
        @override
        Widget build(BuildContext context) {
          return MaterialApp(
            title: 'Xray VPN',
            theme: ThemeData.dark(),
            home: const Scaffold(
              body: Center(
                child: Text(
                  'Xray VPN Client',
                  style: TextStyle(fontSize: 24),
                ),
              ),
            ),
          );
        }
      }
      EOF
          
      - name: Build APK
        script: |
          flutter clean
          flutter pub get
          flutter build apk --release
          
    artifacts:
      - "build/app/outputs/flutter-apk/*.apk"
